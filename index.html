<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SellerSnap QA Review</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}.app{max-width:960px;margin:0 auto;padding:2rem 1.5rem}header{margin-bottom:2rem}header h1{font-size:22px;font-weight:600}header p{font-size:14px;color:#666;margin-top:4px}.card{background:white;border:1px solid #e5e5e0;border-radius:12px;padding:1.5rem;margin-bottom:1rem}.card h2{font-size:15px;font-weight:600;margin-bottom:1rem}.section-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem}.chip{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:24px;background:#f5f5f0;border:1px solid #e0e0d8;font-size:13px;cursor:pointer;transition:all .15s;user-select:none}.chip:hover{border-color:#bbb}.chip.on{background:#e8f0fe;border-color:#4a7fdc;color:#1a4fa0;font-weight:500}.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}.tier-chips{display:flex;gap:8px;margin-bottom:1.25rem}.tier-chip{padding:7px 18px;border-radius:24px;background:#f5f5f0;border:1px solid #e0e0d8;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}.tier-chip:hover{border-color:#bbb}.tier-chip.on{background:#e8f0fe;border-color:#4a7fdc;color:#1a4fa0;font-weight:600}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}.fg{display:flex;flex-direction:column;gap:5px}.fg label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em}.fg input{padding:9px 12px;border:1px solid #e0e0d8;border-radius:8px;font-size:14px;font-family:inherit;outline:none}.runbtn{padding:11px 28px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:1rem}.runbtn:hover{background:#1d4ed8}.runbtn:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}.sbar{display:flex;align-items:center;gap:10px;margin-top:1rem;padding:10px 14px;background:#f9f9f7;border-radius:8px;font-size:13px;color:#555}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.di{background:#aaa}.dr{background:#2563eb;animation:pu 1s infinite}.dd{background:#16a34a}.de{background:#dc2626}@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}.prg{margin-top:12px}.pbar{height:6px;background:#e5e5e0;border-radius:3px;overflow:hidden}.pfill{height:100%;background:#2563eb;border-radius:3px;transition:width .3s}.plbl{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-top:5px}.results{margin-top:2rem}.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}.agent-badge{display:flex;align-items:center;gap:10px}.agent-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px}.rh h2{font-size:18px;font-weight:600}.rh .sub{font-size:13px;color:#888;margin-top:2px}.expbtn{padding:8px 16px;border:1px solid #e0e0d8;border-radius:8px;background:white;font-size:13px;cursor:pointer;font-family:inherit}.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}.mc{background:#f9f9f7;border-radius:10px;padding:1rem 1.25rem}.mc .l{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.mc .v{font-size:28px;font-weight:600}.mc .s{font-size:12px;color:#888;margin-top:3px}.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}.pc{background:white;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem}.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.sbar2{height:5px;border-radius:3px;background:#f0f0eb;margin-top:8px}.sfill{height:100%;border-radius:3px}.sp{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid #f0f0eb;font-size:12px}.sp .n{color:#666;flex:1;margin-right:8px}.sp .sc{font-weight:600;font-size:13px}.tsec{margin-bottom:1.5rem}.tsec h3{font-size:14px;font-weight:600;margin-bottom:10px}.tlist{display:flex;flex-direction:column;gap:8px}.ti{background:white;border:1px solid #e5e5e0;border-radius:10px;padding:12px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.ti .tid{font-size:11px;color:#aaa;font-family:monospace}.ti .tsubj{font-size:13px;font-weight:600;margin:3px 0}.ti .tnote{font-size:12px;color:#666;line-height:1.5}.ti .tscore{font-size:22px;font-weight:600;text-align:right}.ti .tssub{font-size:11px;color:#aaa;text-align:right}.bdg{display:inline-flex;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-top:5px}.bg{background:#dcfce7;color:#166534}.bp{background:#fee2e2;color:#991b1b}.coaching{background:white;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem}.coaching h3{font-size:14px;font-weight:600;margin-bottom:10px}.ci{padding:10px 0;border-top:1px solid #f0f0eb;font-size:13px;color:#555;line-height:1.6}.ci strong{color:#1a1a1a}.rubric-wrap{margin-top:1rem}.rubric-wrap summary{font-size:13px;color:#888;cursor:pointer}.rubric-wrap textarea{width:100%;min-height:160px;margin-top:8px;padding:10px;font-size:12px;font-family:monospace;border:1px solid #e0e0d8;border-radius:8px;background:#f9f9f7;outline:none;resize:vertical;line-height:1.5;color:#333}</style></head><body><div class="app"><header><h1>QA Ticket Review</h1><p>Pull conversations from Intercom and grade against the rubric</p></header><div class="card"><h2>Run a review</h2><div class="section-label">Select agent</div><div class="chips" id="chips"></div><div class="section-label">Select tier</div><div class="tier-chips" id="tierchips"></div><div class="row2"><div class="fg"><label>Week start (Monday)</label><input type="date" id="df"/></div><div class="fg"><label>Week end (Sunday)</label><input type="date" id="dt"/></div></div><details class="rubric-wrap"><summary>Edit grading rubric (advanced)</summary><textarea id="rubric"></textarea></details><button class="runbtn" id="runbtn" onclick="run()" disabled>Run review</button><div id="sb" class="sbar" style="display:none"><div class="dot di" id="sd"></div><span id="st"></span></div><div id="pw" class="prg" style="display:none"><div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div><div class="plbl"><span id="pl"></span><span id="pc"></span></div></div></div><div id="res" class="results" style="display:none"></div></div>
<script>
const AGENTS=[{name:'Gab',id:'7854608',c:'#dbeafe',t:'#1e40af'},{name:'Adam',id:'7855257',c:'#dcfce7',t:'#166534'},{name:'PJ',id:'8057707',c:'#fef9c3',t:'#854d0e'},{name:'Keirth',id:'8057706',c:'#fce7f3',t:'#9d174d'},{name:'Elias',id:'7842123',c:'#ede9fe',t:'#5b21b6'},{name:'Britney',id:'7854653',c:'#ffedd5',t:'#9a3412'},{name:'Mel',id:'7854680',c:'#d1fae5',t:'#065f46'}];

const TIERS=[{name:'Tier 1',id:1,teamId:7852221},{name:'Tier 2',id:2,teamId:7989013},{name:'Tier 3',id:3,teamId:8334782}];
let selectedTier=1;

const RUBRIC_T1=["GRADING RUBRIC - SELLERSNAP SUPPORT TIER 1 (CALIBRATED)","SellerSnap is an Amazon repricing and analytics tool. KB: https://help.sellersnap.io/en/","","PILLAR 1 - CHEERFUL CHARMERS (2 pts)","1a. Pleasant tone overall (1pt)","  1 = Genuine warmth, matched user energy, felt human not robotic","  0 = Generic opener (Hi X thank you for reaching out); OR missed emotional signal (user frustrated, said for a month, or is cancelling)","1b. Tone appropriate to user initial tone (1pt)","  1 = Matched the users emotional register appropriately","  0 = Too stiff for casual user, or too casual for frustrated or formal user","","PILLAR 2 - EDUCATORS (13 pts)","2a. Accuracy of knowledge provided (5pts)","  5 = Fully correct, no errors or misleading info","  4 = Mostly correct with minor imprecision, OR relied on KB link without explaining in plain language","  3 = Made a claim they could not back up with specifics, OR gave wrong info first that was corrected later","  2 = Did the action but did not explain what was done or why","  1 = Significant errors, OR sent Looms that did not answer the actual question","  0 = Fundamentally wrong information or completely incorrect approach","2b. Clarity of explanation (3pts)","  3 = Clear step-by-step that user could follow without guessing","  2 = Mostly clear with minor ambiguity","  1 = Technically correct but overwhelming; OR internal notes visible to user; OR agent second-guessed own answer; OR correct but no story connecting the steps","  0 = Technically correct but a non-expert could not follow it at all","2c. Cause of issue identified or escalated promptly (5pts)","  5 = Root cause correctly found and fully addressed, OR immediate clean escalation with full context","  4 = Root cause mostly identified, minor gap in diagnosis","  3 = Identified the issue category but gave general solution without confirming it applies to this specific account or SKU","  2 = Answered literal question but missed real underlying need; OR identified symptom not root cause; OR said not possible without exploring alternatives; OR missed opportunity to help trial user get set up","  1 = Misdiagnosed or escalated too late","  0 = Generic template response to specific problem; completely abandoned ticket; fundamentally wrong approach","","PILLAR 3 - TRIUMPHANT TROUBLESHOOTERS (8 pts)","3a. All relevant places checked (3pts)","  3 = Checked everything relevant: account settings, specific SKUs mentioned, repricing logs, Seller Central API data, prior tickets","  2 = Checked most relevant areas, missed one obvious place","  1 = Gave partial data requiring user to ask multiple follow-ups; OR gave general policy answer when user provided specific SKUs","  0 = No investigation performed at all","3b. Response relevant to inquiry and solutions suggested (5pts)","  5 = Directly addressed what the user actually needed, not just what they literally asked","  4 = Mostly relevant with a minor miss","  3 = Answered part of the question, missed another part","  2 = Missed part of user question entirely and had to come back; OR explained theory without offering path to resolution","  1 = Answered the literal question but completely missed what the user actually needed","  0 = Irrelevant response","","PILLAR 4 - CREATIVE COLLABORATORS (6 pts)","4a. Response relevant and solutions suggested (5pts) - same score as 3b above","4b. Teamwork and handoff (1pt)","  1 = Seamless planned handoff with full context, OR handled ticket end-to-end","  0 = Rescue situation where senior stepped in because junior could not handle it; OR escalation with no context","","SELLERSNAP CONTEXT: Common topics: AI repricing, Buy Box strategy, min/max prices, DMP, FBA vs FBM, B2B repricing, CSV imports, repricing presets, Buy Box share, stranded listings, pricing errors. Trial users and large accounts deserve extra attention.","","Respond ONLY with valid JSON, no markdown:","{'scores':{'cheerful_tone':0,'cheerful_match':0,'edu_accuracy':0,'edu_clarity':0,'edu_cause':0,'tt_investigation':0,'tt_relevance':0,'cc_teamwork':0},'total':0,'summary':'one sentence','strengths':'1-2 sentences','weaknesses':'1-2 sentences'}"].join("\n");

const RUBRIC_T2=["GRADING RUBRIC - SELLERSNAP TIER 2 SUPPORT (ESCALATIONS)","SellerSnap is an Amazon repricing and analytics tool. KB: https://help.sellersnap.io/en/","","PILLAR 1 - RESPONSE TIME (5 pts)","  5 = Responded to user within 24 hours of assignment","  3 = Responded within 48 hours","  0 = No response or over 48 hours","","PILLAR 2 - RESOLUTION QUALITY (10 pts)","  10 = Core issue fully resolved with clear explanation","  7 = Deep investigation performed, root cause identified even if not fully resolved","  5 = Partial resolution, meaningful gap remains","  2 = Surface-level response, issue not properly addressed","  0 = No meaningful investigation or resolution attempt","","PILLAR 3 - TACT WHEN NO SOLUTION (5 pts)","NOTE: If the issue WAS resolved, award full 5 points automatically.","If the issue was NOT resolved:","  5 = Empathetic tone, clear explanation of why no solution, concrete next steps offered","  3 = Decent communication but could be warmer or clearer","  0 = Blunt, no alternatives offered, user left without direction","","Respond ONLY with valid JSON, no markdown:","{'scores':{'response_time':0,'resolution_quality':0,'tact':0},'total':0,'summary':'one sentence','strengths':'1-2 sentences','weaknesses':'1-2 sentences'}"].join("\n");

const RUBRIC_T3=["GRADING RUBRIC - SELLERSNAP TIER 3 SUPPORT","SellerSnap is an Amazon repricing and analytics tool. KB: https://help.sellersnap.io/en/","","PILLAR 1 - RESOLUTION (15 pts)","  15 = Issue fully resolved with clear communication to customer","  10 = Issue partially resolved with clear path forward provided","  7 = Issue investigated thoroughly but unresolved, appropriately escalated or documented","  0 = No resolution, no clear next steps, issue abandoned","","PILLAR 2 - CLOSURE QUALITY (5 pts)","  5 = Ticket closed cleanly with summary communicated to customer","  3 = Ticket closed but customer communication was lacking or unclear","  0 = Ticket abandoned or closed without customer acknowledgment","","Respond ONLY with valid JSON, no markdown:","{'scores':{'resolution':0,'closure_quality':0},'total':0,'summary':'one sentence','strengths':'1-2 sentences','weaknesses':'1-2 sentences'}"].join("\n");

function getRubric(){return selectedTier===2?RUBRIC_T2:selectedTier===3?RUBRIC_T3:RUBRIC_T1;}
function getMaxScore(){return selectedTier===2?20:selectedTier===3?20:24;}

function getPillars(a,tier){
  if(tier===2)return[
    {name:'Response Time',max:5,bar:'#f59e0b',tc:'#92400e',score:a.response_time||0,subs:[{n:'Responded within 24hrs',s:a.response_time||0,m:5}]},
    {name:'Resolution Quality',max:10,bar:'#8b5cf6',tc:'#4c1d95',score:a.resolution_quality||0,subs:[{n:'Issue resolved or deep investigation',s:a.resolution_quality||0,m:10}]},
    {name:'Tact',max:5,bar:'#14b8a6',tc:'#134e4a',score:a.tact||0,subs:[{n:'Tact when no solution',s:a.tact||0,m:5}]}
  ];
  if(tier===3)return[
    {name:'Resolution',max:15,bar:'#22c55e',tc:'#14532d',score:a.resolution||0,subs:[{n:'Issue resolved',s:a.resolution||0,m:15}]},
    {name:'Closure Quality',max:5,bar:'#8b5cf6',tc:'#4c1d95',score:a.closure_quality||0,subs:[{n:'Clean closure',s:a.closure_quality||0,m:5}]}
  ];
  return[
    {name:'Cheerful Charmers',max:2,bar:'#f59e0b',tc:'#92400e',score:(a.cheerful_tone||0)+(a.cheerful_match||0),subs:[{n:'Pleasant tone',s:a.cheerful_tone||0,m:1},{n:'Tone matches user',s:a.cheerful_match||0,m:1}]},
    {name:'Educators',max:13,bar:'#8b5cf6',tc:'#4c1d95',score:(a.edu_accuracy||0)+(a.edu_clarity||0)+(a.edu_cause||0),subs:[{n:'Accuracy',s:a.edu_accuracy||0,m:5},{n:'Clarity',s:a.edu_clarity||0,m:3},{n:'Cause identified',s:a.edu_cause||0,m:5}]},
    {name:'Triumphant Troubleshooters',max:8,bar:'#22c55e',tc:'#14532d',score:(a.tt_investigation||0)+(a.tt_relevance||0),subs:[{n:'Places checked',s:a.tt_investigation||0,m:3},{n:'Cause accuracy',s:a.tt_relevance||0,m:5}]},
    {name:'Creative Collaborators',max:6,bar:'#14b8a6',tc:'#134e4a',score:(a.tt_relevance||0)+(a.cc_teamwork||0),subs:[{n:'Relevant and solutions',s:a.tt_relevance||0,m:5},{n:'Teamwork and handoff',s:a.cc_teamwork||0,m:1}]}
  ];
}

function getCoaching(a,tier){
  const r=[];
  if(tier===2){
    if((a.response_time||0)<3)r.push('<strong>Response time</strong> - Tier 2 tickets must be responded to within 24 hours. Set reminders and prioritize escalated tickets.');
    if((a.resolution_quality||0)<5)r.push('<strong>Resolution depth</strong> - Escalated tickets require deep investigation. Go beyond surface answers — check logs, account settings, and prior tickets.');
    if((a.tact||0)<3)r.push('<strong>Delivering bad news</strong> - When a solution is not possible, be empathetic, explain why clearly, and always offer a next step or workaround.');
    if(!r.length)r.push('<strong>Strong performance overall</strong> - No major coaching areas this week. Keep it up.');
    return r;
  }
  if(tier===3){
    if((a.resolution||0)<7)r.push('<strong>Resolution rate</strong> - Tier 3 tickets should always reach a clear outcome. If unresolvable, escalate or document thoroughly.');
    if((a.closure_quality||0)<3)r.push('<strong>Closure communication</strong> - Always summarize what was done and communicate the outcome clearly to the customer before closing.');
    if(!r.length)r.push('<strong>Strong performance overall</strong> - No major coaching areas this week. Keep it up.');
    return r;
  }
  if((a.edu_accuracy||0)<3.5)r.push('<strong>Product knowledge gaps</strong> - Review the KB, especially repricing rules, DMP, Buy Box strategy, and B2B repricing.');
  if((a.edu_clarity||0)<2)r.push('<strong>Explanation clarity</strong> - Responses are hard to follow. Use numbered steps and tell a story that connects the dots.');
  if((a.edu_cause||0)<3)r.push('<strong>Root cause identification</strong> - Always ask: why is this happening on THIS account or SKU specifically?');
  if((a.tt_investigation||0)<2)r.push('<strong>Investigation thoroughness</strong> - Check the actual account and logs before responding. Do not give general answers when specific SKUs are provided.');
  if((a.cheerful_tone||0)<0.7)r.push('<strong>Tone and warmth</strong> - Responses feel robotic. Drop the template opener. Acknowledge frustration when users express it.');
  if((a.cc_teamwork||0)<0.7)r.push('<strong>Handoff quality</strong> - Include full context so the next agent does not start from scratch.');
  if(!r.length)r.push('<strong>Strong performance overall</strong> - No major coaching areas this week. Keep it up.');
  return r;
}

function avgS(graded,tier){
  const keys=tier===2?['response_time','resolution_quality','tact']:tier===3?['resolution','closure_quality']:['cheerful_tone','cheerful_match','edu_accuracy','edu_clarity','edu_cause','tt_investigation','tt_relevance','cc_teamwork'];
  const a={};
  keys.forEach(function(k){a[k]=graded.reduce(function(s,g){return s+((g.grade&&g.grade.scores&&g.grade.scores[k])||0);},0)/graded.length;});
  return a;
}

let agent=null,ST=null;

function init(){
  const ch=document.getElementById('chips');
  AGENTS.forEach(function(a){
    const d=document.createElement('div');
    d.className='chip';
    d.dataset.n=a.name;
    d.innerHTML='<div class="av" style="background:'+a.c+';color:'+a.t+'">'+a.name.slice(0,2).toUpperCase()+'</div>'+a.name;
    d.onclick=function(){pick(a.name);};
    ch.appendChild(d);
  });
  const tc=document.getElementById('tierchips');
  TIERS.forEach(function(t){
    const d=document.createElement('div');
    d.className='tier-chip'+(t.id===1?' on':'');
    d.dataset.tid=t.id;
    d.textContent=t.name;
    d.onclick=function(){
      selectedTier=t.id;
      document.querySelectorAll('.tier-chip').forEach(function(c){c.classList.toggle('on',parseInt(c.dataset.tid)===selectedTier);});
      document.getElementById('rubric').value=getRubric();
      upBtn();
    };
    tc.appendChild(d);
  });
  document.getElementById('rubric').value=getRubric();
  const today=new Date(),day=today.getDay();
  const sun=new Date(today);sun.setDate(today.getDate()-day);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);
  document.getElementById('df').value=sun.toISOString().split('T')[0];
  document.getElementById('dt').value=sat.toISOString().split('T')[0];
  document.getElementById('df').onchange=upBtn;
  document.getElementById('dt').onchange=upBtn;
}

function pick(n){agent=(agent===n)?null:n;document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on',c.dataset.n===agent);});upBtn();}
function upBtn(){document.getElementById('runbtn').disabled=!(agent&&document.getElementById('df').value&&document.getElementById('dt').value);}
function setSt(t,txt){document.getElementById('sb').style.display='flex';document.getElementById('sd').className='dot d'+t;document.getElementById('st').textContent=txt;}
function setPrg(p,l,c){document.getElementById('pw').style.display='block';document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=l;document.getElementById('pc').textContent=c||'';}

function getAdminId(ag){const found=AGENTS.find(function(a){return a.name===ag;});if(!found||!found.id)throw new Error('No ID for agent: '+ag);return {id:found.id,name:found.name};}

async function searchConvs(adminId,df,dt){
  const fromTs=Math.floor(new Date(df).getTime()/1000);
  const toTs=Math.floor(new Date(dt+'T23:59:59').getTime()/1000);
  const teamId=TIERS.find(function(t){return t.id===selectedTier;}).teamId;
  const r=await fetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminId:adminId,fromTs:fromTs,toTs:toTs,teamId:teamId})});
  if(!r.ok)throw new Error('Search failed: '+r.status);
  const d=await r.json();
  return d.conversations||[];
}

async function getMsgs(id){
  const r=await fetch('/api/conversations/'+id);
  if(!r.ok)return null;
  const d=await r.json();
  const parts=[];
  if(d.source&&d.source.body)parts.push('USER: '+d.source.body.replace(/<[^>]+>/g,'').trim());
  for(const p of(d.conversation_parts&&d.conversation_parts.conversation_parts)||[]){
    if(!p.body)continue;
    parts.push((p.author&&p.author.type==='admin'?'AGENT':'USER')+': '+p.body.replace(/<[^>]+>/g,'').trim());
  }
  return{id:id,subject:(d.source&&d.source.subject)||'Conversation '+id,transcript:parts.join('\n')};
}

async function gradeConv(conv,rub){
  const prompt='You are a QA analyst for SellerSnap support. Grade this conversation.\n\n'+rub+'\n\n---\nID: '+conv.id+'\nSUBJECT: '+conv.subject+'\n\n'+conv.transcript+'\n---\n\nRespond ONLY with valid JSON, no markdown fences.';
  const r=await fetch('/grade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const d=await r.json();
  return JSON.parse(d.content.map(function(b){return b.text||'';}).join('').replace(/```json|```/g,'').trim());
}

function sample20pct(arr){const n=Math.max(1,Math.floor(arr.length*0.2));const shuffled=[...arr].sort(function(){return Math.random()-0.5;});return shuffled.slice(0,n);}

function render(ag,graded,df,dt,tier){
  const maxScore=getMaxScore();
  const sorted=[...graded].sort(function(a,b){return((b.grade&&b.grade.total)||0)-((a.grade&&a.grade.total)||0);});
  const top3=sorted.slice(0,3),bot3=sorted.slice(-3).reverse();
  const oa=graded.reduce(function(s,g){return s+((g.grade&&g.grade.total)||0);},0)/graded.length;
  const pct=Math.round(oa/maxScore*100);
  const a=avgS(graded,tier),ps=getPillars(a,tier),co=getCoaching(a,tier);
  const ai=AGENTS.find(function(x){return x.name===ag;})||{c:'#dbeafe',t:'#1e40af'};
  const tierName=TIERS.find(function(t){return t.id===tier;}).name;
  let h='<div class="rh"><div class="agent-badge"><div class="agent-av" style="background:'+ai.c+';color:'+ai.t+'">'+ag.slice(0,2).toUpperCase()+'</div><div><h2>'+ag+' - '+tierName+' weekly QA report</h2><div class="sub">'+df+' to '+dt+' &middot; '+graded.length+' tickets reviewed</div></div></div><button class="expbtn" onclick="doExport()">Export</button></div>';
  h+='<div class="hero"><div class="mc"><div class="l">Average score</div><div class="v">'+oa.toFixed(1)+'<span style="font-size:15px;color:#aaa"> / '+maxScore+'</span></div><div class="s">'+pct+'% &middot; '+graded.length+' tickets</div></div><div class="mc"><div class="l">Top ticket</div><div class="v">'+((top3[0]&&top3[0].grade&&top3[0].grade.total)||'--')+'<span style="font-size:15px;color:#aaa"> / '+maxScore+'</span></div><div class="s" style="font-family:monospace;font-size:11px">'+((top3[0]&&top3[0].id)||'')+'</div></div><div class="mc"><div class="l">Lowest ticket</div><div class="v">'+((bot3[0]&&bot3[0].grade&&bot3[0].grade.total)||'--')+'<span style="font-size:15px;color:#aaa"> / '+maxScore+'</span></div><div class="s" style="font-family:monospace;font-size:11px">'+((bot3[0]&&bot3[0].id)||'')+'</div></div><div class="mc"><div class="l">Tickets sampled</div><div class="v">'+graded.length+'</div><div class="s">20% sample</div></div></div>';
  h+='<div class="pgrid">';
  ps.forEach(function(p){
    h+='<div class="pc"><div class="ph"><span style="font-size:13px;font-weight:600;color:'+p.tc+'">'+p.name+'</span><span style="font-size:20px;font-weight:600">'+p.score.toFixed(1)+'<span style="font-size:14px;font-weight:400;color:#aaa"> / '+p.max+'</span></span></div><div class="sbar2"><div class="sfill" style="width:'+Math.round(p.score/p.max*100)+'%;background:'+p.bar+'"></div></div>';
    p.subs.forEach(function(sp){h+='<div class="sp"><span class="n">'+sp.n+'</span><span class="sc">'+sp.s.toFixed(1)+' / '+sp.m+'</span></div>';});
    h+='</div>';
  });
  h+='</div>';
  function tks(list,lbl,bc,bl){
    h+='<div class="tsec"><h3>'+lbl+'</h3><div class="tlist">';
    list.forEach(function(c){
      const note=bc==='bg'?((c.grade&&c.grade.strengths)||''):((c.grade&&c.grade.weaknesses)||'');
      h+='<div class="ti"><div><div class="tid">'+c.id+'</div><div class="tsubj">'+((c.conv&&c.conv.subject)||'Untitled')+'</div><div class="tnote">'+note+'</div></div><div style="text-align:right"><div class="tscore">'+((c.grade&&c.grade.total)||'--')+'</div><div class="tssub">/ '+maxScore+'</div><span class="bdg '+bc+'">'+bl+'</span></div></div>';
    });
    h+='</div></div>';
  }
  tks(top3,'Top 3 tickets','bg','strong');
  tks(bot3,'Bottom 3 tickets','bp','needs work');
  h+='<div class="coaching"><h3>Coaching focus areas</h3>';
  co.forEach(function(c){h+='<div class="ci">'+c+'</div>';});
  h+='</div>';
  document.getElementById('res').innerHTML=h;
  document.getElementById('res').style.display='block';
  ST={ag:ag,graded:graded,df:df,dt:dt,oa:oa,pct:pct,a:a,tier:tier,maxScore:maxScore};
  window.scrollTo({top:document.getElementById('res').offsetTop-20,behavior:'smooth'});
}

function doExport(){
  if(!ST)return;
  const ps=getPillars(ST.a,ST.tier),s=[...ST.graded].sort(function(a,b){return((b.grade&&b.grade.total)||0)-((a.grade&&a.grade.total)||0);});
  const tierName=TIERS.find(function(t){return t.id===ST.tier;}).name;
  let l=['QA REPORT - '+ST.ag+' ('+tierName+')','Period: '+ST.df+' to '+ST.dt,'Tickets sampled: '+ST.graded.length,'Avg: '+ST.oa.toFixed(1)+'/'+ST.maxScore+' ('+ST.pct+'%)','','PILLAR SCORES'];
  ps.forEach(function(p){l.push(p.name+': '+p.score.toFixed(1)+'/'+p.max);});
  l.push('','TICKET SCORES');
  s.forEach(function(g){l.push(g.id+': '+((g.grade&&g.grade.total)||'N/A')+'/'+ST.maxScore+' - '+((g.conv&&g.conv.subject)||''));});
  l.push('','COACHING');
  getCoaching(ST.a,ST.tier).forEach(function(c){l.push('- '+c.replace(/<[^>]+>/g,''));});
  const b=new Blob([l.join('\n')],{type:'text/plain'});
  const x=document.createElement('a');x.href=URL.createObjectURL(b);x.download='QA_'+ST.ag+'_'+tierName.replace(' ','')+'_'+ST.df+'.txt';x.click();
}

async function run(){
  const df=document.getElementById('df').value,dt=document.getElementById('dt').value,rub=document.getElementById('rubric').value;
  document.getElementById('runbtn').disabled=true;
  document.getElementById('res').style.display='none';
  setSt('r','Looking up agent...');
  setPrg(5,'Connecting to Intercom...','');
  try{
    const admin=getAdminId(agent);
    setPrg(15,'Searching conversations for '+admin.name+'...','');
    const convs=await searchConvs(admin.id,df,dt);
    if(!convs.length){setSt('e','No conversations found for '+agent+' in this date range');document.getElementById('runbtn').disabled=false;return;}
    const sampled=sample20pct(convs);
    setPrg(30,'Found '+convs.length+' conversations. Sampling '+sampled.length+' (20%)...','');
    const details=[];
    for(let i=0;i<sampled.length;i++){
      const d=await getMsgs(sampled[i].id);
      if(d&&d.transcript.length>50)details.push(d);
      setPrg(30+Math.round(i/sampled.length*20),'Fetching transcripts...',(i+1)+'/'+sampled.length);
    }
    setPrg(50,'Grading '+details.length+' conversations...','0/'+details.length);
    const graded=[];
    for(let i=0;i<details.length;i++){
      try{const g=await gradeConv(details[i],rub);graded.push({id:details[i].id,conv:details[i],grade:g});}
      catch(e){graded.push({id:details[i].id,conv:details[i],grade:null});}
      setPrg(50+Math.round((i+1)/details.length*50),'Grading...',(i+1)+'/'+details.length);
    }
    const valid=graded.filter(function(g){return g.grade;});
    setPrg(100,'Complete!',valid.length+' graded');
    setSt('d','Done - '+valid.length+' tickets graded');
    render(agent,valid,df,dt,selectedTier);
  }catch(e){setSt('e',e.message||'Something went wrong');console.error(e);}
  document.getElementById('runbtn').disabled=false;
}

init();
</script></body></html>
